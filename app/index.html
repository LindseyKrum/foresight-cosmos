<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foresight Cosmos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000008;
      overflow: hidden;
      font-family: 'Georgia', serif;
      color: #e8e4d9;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }
    #canvas-container:active { cursor: grabbing; }

    /* ── Legend ── */
    #legend {
      position: fixed;
      bottom: 28px;
      left: 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
      pointer-events: none;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(232,228,217,0.55);
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Info panel ── */
    #panel {
      position: fixed;
      top: 0; right: 0;
      width: 380px;
      height: 100vh;
      background: rgba(4, 4, 18, 0.92);
      border-left: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 20;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #panel.open { transform: translateX(0); }

    #panel-close {
      position: absolute;
      top: 20px; right: 20px;
      background: none;
      border: none;
      color: rgba(232,228,217,0.4);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }
    #panel-close:hover { color: rgba(232,228,217,0.9); }

    #panel-type {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(232,228,217,0.35);
      padding: 32px 32px 0;
    }

    #panel-title {
      font-size: 22px;
      font-weight: 400;
      line-height: 1.3;
      padding: 10px 32px 0;
      color: #e8e4d9;
    }

    #panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 32px 32px;
    }
    #panel-body::-webkit-scrollbar { width: 3px; }
    #panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    #panel-desc {
      font-size: 15px;
      line-height: 1.80;
      color: rgba(232,228,217,0.82);
      margin-bottom: 10px;
    }

    #panel-report-note {
      font-size: 11px;
      color: rgba(232,228,217,0.32);
      letter-spacing: 0.04em;
      font-style: italic;
      margin-bottom: 26px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .panel-section-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232,228,217,0.3);
      margin-bottom: 10px;
    }

    #panel-sources {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 28px;
    }

    .source-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 12px;
      color: rgba(232,228,217,0.55);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 8px;
      gap: 12px;
    }
    .source-name { flex: 1; }
    .source-year {
      font-size: 11px;
      color: rgba(232,228,217,0.3);
      white-space: nowrap;
    }
    .source-link {
      color: rgba(140,180,255,0.6);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .source-link:hover { color: rgba(140,180,255,0.9); }

    #panel-connections { margin-bottom: 28px; }
    .connection-tag {
      display: inline-block;
      font-size: 11px;
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      margin: 0 6px 6px 0;
      color: rgba(232,228,217,0.5);
      cursor: pointer;
      transition: all 0.2s;
    }
    .connection-tag:hover {
      border-color: rgba(255,255,255,0.3);
      color: rgba(232,228,217,0.9);
    }

    /* ── Signal recency bar ── */
    #panel-recency {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .recency-bar {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .recency-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    .recency-label {
      font-size: 10px;
      letter-spacing: 0.08em;
      color: rgba(232,228,217,0.3);
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Dying star notice ── */
    .dying-notice {
      font-size: 11px;
      color: rgba(255, 120, 60, 0.7);
      letter-spacing: 0.06em;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(4, 4, 18, 0.88);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 14px;
      border-radius: 4px;
      font-size: 12px;
      color: rgba(232,228,217,0.8);
      transform: translate(14px, -50%);
      z-index: 30;
      display: none;
      max-width: 220px;
      line-height: 1.5;
    }
    #tooltip-type {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232,228,217,0.3);
      margin-bottom: 2px;
    }

    /* ── Title ── */
    #title {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 10;
      pointer-events: none;
    }
    #title h1 {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(232,228,217,0.4);
    }
    #title p {
      font-size: 10px;
      letter-spacing: 0.08em;
      color: rgba(232,228,217,0.2);
      margin-top: 4px;
    }

    /* ── Nav hint ── */
    #nav-hint {
      position: fixed;
      bottom: 28px;
      right: 32px;
      z-index: 10;
      text-align: right;
      pointer-events: none;
    }
    .nav-hint-line {
      font-size: 10px;
      letter-spacing: 0.09em;
      color: rgba(232,228,217,0.22);
      margin-top: 5px;
      text-transform: uppercase;
    }

    /* ── Reset button ── */
    #reset-view {
      position: fixed;
      bottom: 28px;
      right: 32px;
      z-index: 10;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(232,228,217,0.4);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      display: none;
    }
    #reset-view:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
      color: rgba(232,228,217,0.9);
    }

    /* ── Filter bar ── */
    #filters {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    .filter-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(232,228,217,0.45);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .filter-btn:hover, .filter-btn.active {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
      color: rgba(232,228,217,0.9);
    }

    /* ── Planet Legend ── */
    #legend-planets {
      position: fixed;
      top: 50%;
      left: 28px;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    #legend-toggle {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(232,228,217,0.4);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      margin-bottom: 4px;
      width: 100%;
    }
    #legend-toggle:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(232,228,217,0.9);
    }
    #planet-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.35s ease;
      max-height: 600px;
      opacity: 1;
    }
    #planet-list.hidden {
      max-height: 0;
      opacity: 0;
    }
    .planet-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: rgba(232,228,217,0.5);
      cursor: pointer;
      transition: color 0.2s;
      white-space: nowrap;
    }
    .planet-legend-item:hover { color: rgba(232,228,217,0.95); }
    .planet-legend-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Driver filter panel ── */
    #driver-panel {
      position: fixed;
      top: 50%;
      left: 28px;
      transform: translateY(calc(-50% + 180px));
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    #driver-toggle {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(232,228,217,0.4);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      margin-bottom: 4px;
      width: 100%;
    }
    #driver-toggle:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(232,228,217,0.9);
    }
    #driver-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.35s ease;
      max-height: 0;
      opacity: 0;
    }
    #driver-list.visible {
      max-height: 400px;
      opacity: 1;
    }
    .driver-btn {
      font-size: 9px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(232,228,217,0.45);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      white-space: nowrap;
      text-align: left;
    }
    .driver-btn:hover  { color: rgba(232,228,217,0.9); background: rgba(255,255,255,0.09); }
    .driver-btn.active { border-color: currentColor; color: rgba(232,228,217,0.95); background: rgba(255,255,255,0.10); }

    /* ── Convergence badge ── */
    .convergence-badge {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 9px;
      border-radius: 12px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ── Org breakdown bar ── */
    .org-breakdown {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .org-type-chip {
      font-size: 9px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 12px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    /* ── Driver tag ── */
    .driver-tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.06em;
      padding: 3px 10px;
      border-radius: 12px;
      margin: 0 5px 5px 0;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(232,228,217,0.65);
    }

    /* ── Tension item ── */
    .tension-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,100,60,0.1);
    }
    .tension-item:last-child { border-bottom: none; }
    .tension-arrow { color: rgba(255,120,60,0.7); font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .tension-text { flex: 1; min-width: 0; }
    .tension-partner { font-size: 12px; color: rgba(232,228,217,0.75); margin-bottom: 3px; cursor: pointer; }
    .tension-partner:hover { color: rgba(255,160,100,0.95); }
    .tension-label { font-size: 10px; color: rgba(255,120,60,0.55); letter-spacing: 0.05em; }

    /* ── Search ── */
    #search-wrap {
      position: fixed;
      top: 28px;
      right: 32px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      isolation: isolate;
    }
    #search-field {
      position: relative;
      display: flex;
      align-items: center;
    }
    #search-icon {
      position: absolute;
      top: 9px;
      left: 12px;
      font-size: 14px;
      color: rgba(180,210,255,0.65);
      pointer-events: none;
      z-index: 1;
      line-height: 1;
    }
    #search-input {
      background: rgba(15,15,40,0.96);
      border: 1px solid rgba(255,255,255,0.42);
      color: rgba(232,228,217,0.95);
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 0.05em;
      padding: 8px 16px 8px 32px;
      border-radius: 20px;
      width: 240px;
      outline: none;
      transition: border-color 0.2s, width 0.3s, box-shadow 0.2s;
      box-shadow: 0 0 14px rgba(140,180,255,0.18), inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    #search-input::placeholder { color: rgba(232,228,217,0.55); }
    #search-input:focus {
      border-color: rgba(180,210,255,0.75);
      width: 290px;
      box-shadow: 0 0 22px rgba(140,180,255,0.30), inset 0 0 0 1px rgba(255,255,255,0.06);
    }
    #search-results {
      background: rgba(4,4,18,0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      backdrop-filter: blur(12px);
      max-height: 340px;
      overflow-y: auto;
      width: 280px;
      display: none;
    }
    #search-results::-webkit-scrollbar { width: 3px; }
    #search-results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }
    .search-result-item {
      padding: 9px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: rgba(255,255,255,0.06); }
    .search-result-type {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232,228,217,0.3);
      margin-bottom: 2px;
    }
    .search-result-name {
      font-size: 12px;
      color: rgba(232,228,217,0.8);
      line-height: 1.4;
    }
    .search-result-name mark {
      background: none;
      color: #fff;
      font-weight: bold;
    }
    #search-empty {
      padding: 16px;
      font-size: 12px;
      color: rgba(232,228,217,0.3);
      text-align: center;
      letter-spacing: 0.05em;
    }

    /* ══════════════════════════════════════════════════════
       Mobile  (≤ 767 px)
       ══════════════════════════════════════════════════════ */
    @media (max-width: 767px) {

      /* Canvas — tell browser not to interfere with Three.js touch */
      #canvas-container canvas { touch-action: none; }

      /* Title — compact top-left */
      #title { top: 14px; left: 14px; }
      #title h1 { font-size: 11px; letter-spacing: 0.14em; }
      #title p  { display: none; }

      /* Filter bar — scrollable strip below title */
      #filters {
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        transform: none;
        justify-content: flex-start;
        gap: 6px;
        overflow-x: auto;
        overflow-y: hidden;
        flex-wrap: nowrap;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding: 10px 14px 14px;
        background: linear-gradient(to top, rgba(0,0,8,0.92) 70%, transparent);
        backdrop-filter: none;
        z-index: 12;
      }
      #filters::-webkit-scrollbar { display: none; }
      .filter-btn {
        padding: 6px 12px;
        font-size: 9px;
        white-space: nowrap;
        flex-shrink: 0;
        min-height: 32px;
        touch-action: manipulation;
      }

      /* Panel — bottom sheet instead of right drawer */
      #panel {
        width: 100%;
        height: 78vh;
        max-height: 78vh;
        top: auto;
        bottom: 0;
        right: 0;
        border-radius: 18px 18px 0 0;
        border-left: none;
        border-top: 1px solid rgba(255,255,255,0.1);
        transform: translateY(100%);
        transition: transform 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        padding-top: 0;
      }
      #panel.open { transform: translateY(0); }

      /* Drag handle */
      #panel::before {
        content: '';
        display: block;
        width: 36px;
        height: 3px;
        background: rgba(255,255,255,0.18);
        border-radius: 2px;
        margin: 10px auto 0;
        flex-shrink: 0;
      }
      #panel-type  { padding-top: 16px; }
      #panel-title { font-size: 18px; padding-top: 8px; }
      #panel-close { top: 12px; right: 14px; font-size: 18px; }
      #panel-body  { padding: 16px 20px 40px; }

      /* Planet legend — top-left below title area */
      #legend-planets {
        top: 50px;
        left: 14px;
        transform: none;
        max-width: 164px;
        z-index: 11;
      }
      #legend-toggle {
        font-size: 9px;
        padding: 5px 10px;
        touch-action: manipulation;
      }
      .planet-legend-item {
        font-size: 9px;
        min-height: 28px;
        touch-action: manipulation;
      }
      #planet-list {
        max-height: 40vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      /* Driver panel — hidden by default on mobile,
         accessible via toggle but positioned differently */
      #driver-panel {
        top: auto;
        bottom: 54px;   /* just above filter bar */
        left: 14px;
        transform: none;
        max-width: 172px;
        z-index: 11;
      }
      #driver-toggle {
        font-size: 9px;
        padding: 5px 10px;
        touch-action: manipulation;
      }
      .driver-btn {
        font-size: 9px;
        min-height: 28px;
        touch-action: manipulation;
      }
      #driver-list { max-height: 36vh; overflow-y: auto; }

      /* Search — collapses to icon; expands on focus */
      #search-wrap { top: 10px; right: 12px; z-index: 13; }
      #search-input {
        width: 36px;
        padding: 8px 8px 8px 28px;
        border-color: rgba(255,255,255,0.22);
        box-shadow: none;
      }
      #search-input:focus {
        width: min(220px, 58vw);
        border-color: rgba(180,210,255,0.75);
        box-shadow: 0 0 18px rgba(140,180,255,0.25);
      }
      #search-icon { top: 10px; left: 10px; font-size: 13px; }
      #search-results { width: min(260px, 88vw); }

      /* Nav hint — swap for touch copy, bottom-right above filter strip */
      #nav-hint {
        bottom: 52px;
        right: 14px;
        text-align: right;
      }
      #nav-hint .nav-hint-line:first-child::before {
        content: 'Pinch to zoom · Drag to orbit';
      }
      #nav-hint .nav-hint-line:first-child { font-size: 0; } /* hide original text */
      #nav-hint .nav-hint-line:first-child::before { font-size: 9px; }
      #nav-hint .nav-hint-line:last-child { display: none; }

      /* Reset button — above filter strip, right */
      #reset-view {
        bottom: 52px;
        right: 14px;
        padding: 5px 12px;
        font-size: 9px;
      }

      /* Bottom signal-type legend — hide (too small to be useful) */
      #legend { display: none; }

      /* Tooltip — shift so it doesn't get cut off */
      #tooltip { max-width: 180px; font-size: 11px; }

      /* Connection / source items — more thumb-friendly */
      .connection-tag {
        padding: 6px 12px;
        font-size: 11px;
        min-height: 32px;
        display: inline-flex;
        align-items: center;
        touch-action: manipulation;
      }
      .source-item { padding-bottom: 12px; gap: 8px; }
      .tension-partner { font-size: 13px; min-height: 32px; display: flex; align-items: center; }
    }

    /* Very small screens (≤ 380 px) */
    @media (max-width: 380px) {
      #panel { height: 82vh; }
      #panel-title { font-size: 16px; }
      #search-input:focus { width: min(180px, 55vw); }
      #legend-planets { max-width: 148px; }
    }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #000008;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      flex-direction: column;
      gap: 16px;
    }
    #loading p {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(232,228,217,0.3);
    }
    .loading-dots span {
      display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(232,228,217,0.3);
      margin: 0 3px;
      animation: pulse 1.4s infinite ease-in-out;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="loading-dots"><span></span><span></span><span></span></div>
  <p>Mapping the cosmos</p>
</div>

<div id="title">
  <h1>Foresight Cosmos</h1>
  <p id="report-count"></p>
</div>

<div id="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="signals">Signals</button>
  <button class="filter-btn" data-filter="trends">Trends</button>
  <button class="filter-btn" data-filter="connections">Connections</button>
  <button class="filter-btn" data-filter="tensions">Tensions</button>
</div>

<div id="canvas-container"></div>

<!-- Planet legend -->
<div id="legend-planets">
  <button id="legend-toggle">⬡ Planets</button>
  <div id="planet-list"><!-- populated by JS --></div>
</div>

<!-- Driver filter -->
<div id="driver-panel">
  <button id="driver-toggle">⟡ Drivers</button>
  <div id="driver-list"><!-- populated by JS --></div>
</div>

<!-- Search -->
<div id="search-wrap">
  <div id="search-field">
    <span id="search-icon">⌕</span>
    <input id="search-input" type="text" placeholder="Search signals &amp; trends…" autocomplete="off" spellcheck="false">
  </div>
  <div id="search-results"></div>
</div>

<div id="nav-hint">
  <div class="nav-hint-line">Scroll to zoom · Drag to orbit</div>
  <div class="nav-hint-line">Click any object to explore · R to reset</div>
</div>

<button id="reset-view">↩ Reset View</button>

<div id="legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:#b0c8ff; box-shadow: 0 0 6px #b0c8ff;"></div>
    Weak Signal
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#f5c842; width:14px; height:14px; box-shadow: 0 0 10px #f5c842;"></div>
    Trend
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#ff7a3c; box-shadow: 0 0 6px #ff7a3c; opacity: 0.6;"></div>
    Fading Signal
  </div>
</div>

<div id="panel">
  <button id="panel-close">✕</button>
  <div id="panel-type"></div>
  <div id="panel-title"></div>
  <div id="panel-body">
    <p id="panel-desc"></p>
    <p id="panel-report-note"></p>
    <div id="dying-notice-container"></div>
    <div id="panel-recency-container"></div>
    <div id="panel-ecology-container"></div>
    <div id="panel-connections-container"></div>
    <div id="panel-scenarios-container"></div>
    <div id="panel-sources-container"></div>
  </div>
</div>

<div id="tooltip">
  <div id="tooltip-type"></div>
  <div id="tooltip-name"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module" src="cosmos.js"></script>

</body>
</html>
